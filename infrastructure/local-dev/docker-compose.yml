services:
  postgres:
    image: postgres:16-alpine
    container_name: aegisflow-postgres
    environment:
      POSTGRES_DB: aegisflow
      POSTGRES_USER: aegisflow
      POSTGRES_PASSWORD: aegisflow
    ports:
      - "5432:5432"
    volumes:
      - aegisflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisflow -d aegisflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.9
    container_name: aegisflow-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - aegisflow-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: aegisflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway-api:
    build:
      context: ../../apps/gateway-api
    container_name: aegisflow-gateway-api
    environment:
      DATABASE_URL: postgresql+asyncpg://aegisflow:aegisflow@postgres:5432/aegisflow
      SERVICE_NAME: gateway-api
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: aegisflow-workflows
      ENABLE_TEMPORAL_START: "true"
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_WORKFLOW_EVENTS_TOPIC: workflow-events
      ENABLE_EVENT_PUBLISHING: "true"
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      ENABLE_TELEMETRY: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      redis:
        condition: service_started
      temporal:
        condition: service_started

  operator-console:
    build:
      context: ../../apps/operator-console
    container_name: aegisflow-operator-console
    environment:
      VITE_GATEWAY_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      gateway-api:
        condition: service_started

  agent-runtime:
    build:
      context: ../..
      dockerfile: apps/agent-runtime/Dockerfile
    container_name: aegisflow-agent-runtime
    environment:
      SERVICE_NAME: agent-runtime
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      PROMPTS_PATH: /app/prompts
      TOOL_RUNTIME_URL: http://tool-runtime:8020
      ENABLE_TOOL_RUNTIME: "true"
      ENABLE_TELEMETRY: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8010:8010"
    depends_on:
      tool-runtime:
        condition: service_started

  tool-runtime:
    build:
      context: ../../apps/tool-runtime
    container_name: aegisflow-tool-runtime
    environment:
      SERVICE_NAME: tool-runtime
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      ENABLE_TELEMETRY: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8020:8020"

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: aegisflow-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: aegisflow
      POSTGRES_PWD: aegisflow
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: aegisflow-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      temporal:
        condition: service_started

  workflow-engine:
    build:
      context: ../../apps/workflow-engine
    container_name: aegisflow-workflow-engine
    environment:
      DATABASE_URL: postgresql+asyncpg://aegisflow:aegisflow@postgres:5432/aegisflow
      SERVICE_NAME: workflow-engine
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_TASK_QUEUE: aegisflow-workflows
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_WORKFLOW_EVENTS_TOPIC: workflow-events
      ENABLE_EVENT_PUBLISHING: "true"
      AGENT_RUNTIME_URL: http://agent-runtime:8010
      ENABLE_AGENT_RUNTIME: "true"
      ENABLE_TELEMETRY: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      METRICS_PORT: "8030"
    ports:
      - "8030:8030"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      temporal:
        condition: service_started
      agent-runtime:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: aegisflow-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: aegisflow-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14269:14269"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aegisflow-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - aegisflow-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.0
    container_name: aegisflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: aegisflow
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - aegisflow-grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started

volumes:
  aegisflow-postgres-data:
  aegisflow-redpanda-data:
  aegisflow-prometheus-data:
  aegisflow-grafana-data:

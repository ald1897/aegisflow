global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: otel-collector-exported-metrics
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: jaeger
    static_configs:
      - targets:
          - jaeger:14269

  - job_name: gateway-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway-api:8000

  - job_name: workflow-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - workflow-engine:8030
